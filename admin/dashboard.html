<!DOCTYPE html>
<html>
<head>

<title>ScratchPay Admin</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background:#f4f6fb;
padding:40px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

h1{
color:#333;
}

button{
padding:10px 18px;
background:#667eea;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#5563d1;
}

.table-container{
background:white;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
overflow:hidden;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#667eea;
color:white;
padding:15px;
text-align:left;
}

td{
padding:14px;
border-bottom:1px solid #eee;
}

tr:hover{
background:#f9f9f9;
}

.status-used{
color:red;
font-weight:bold;
}

.status-unused{
color:green;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">

<h1>ScratchPay Admin Dashboard</h1>

<button onclick="loadData()">Refresh</button>

</div>

<div class="table-container">

<table>

<thead>

<tr>
<th>ID</th>
<th>Reward</th>
<th>Status</th>
</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

<script>

function loadData(){

fetch("http://127.0.0.1:5000/cards")
.then(res=>res.json())
.then(data=>{

var table=document.getElementById("tableBody")
table.innerHTML=""

data.forEach(card=>{

var status=card.claimed?"Used":"Unused"
var cls=card.claimed?"status-used":"status-unused"

table.innerHTML+=`
<tr>
<td>${card.id}</td>
<td>${card.reward}</td>
<td class="${cls}">${status}</td>
</tr>
`

})

})

}

</script>

</body>
</html>
