<!DOCTYPE html>
<html>
<head>
<title>ScratchPay</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
}

.container{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
width:380px;
}

h1{
margin-bottom:20px;
color:#333;
}

#card{
width:320px;
height:160px;
margin:20px auto;
position:relative;
border-radius:10px;
overflow:hidden;
}

#reward{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
font-weight:bold;
color:#333;
background:#fafafa;
}

canvas{
position:absolute;
top:0;
left:0;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
background:#667eea;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#5563d1;
}

</style>

</head>

<body>

<div class="container">

<h1>ScratchPay</h1>

<div id="card">

<div id="reward">Generate Card</div>

<canvas id="scratchCanvas" width="320" height="160"></canvas>

</div>

<div style="display: flex; justify-content: center; gap: 10px; margin-top: 20px;">
<button onclick="generateCard()" style="margin-top: 0;">Generate Scratch Card</button>
<button onclick="goToWithdraw()" style="margin-top: 0; background: #28a745;">Withdraw</button>
</div>

</div>

<script>

var canvas = document.getElementById("scratchCanvas")
var ctx = canvas.getContext("2d")

function resetScratch(){

ctx.globalCompositeOperation="source-over"
ctx.fillStyle="silver"
ctx.fillRect(0,0,320,160)

}

resetScratch()

function generateCard(){

fetch("http://127.0.0.1:5000/generate",{
method:"POST"
})
.then(res=>res.json())
.then(data=>{

document.getElementById("reward").innerText=data.reward
resetScratch()

})

}

canvas.addEventListener("mousemove",function(e){

if(e.buttons==1){

var rect=canvas.getBoundingClientRect()
var x=e.clientX-rect.left
var y=e.clientY-rect.top

ctx.globalCompositeOperation="destination-out"
ctx.beginPath()
ctx.arc(x,y,18,0,Math.PI*2)
ctx.fill()

}

})

function goToWithdraw() {
    var rewardText = document.getElementById("reward").innerText;
    if (rewardText === "Generate Card" || rewardText === "") {
        alert("Please generate a scratch card first!");
        return;
    }
    window.location.href = 'withdraw.html?reward=' + encodeURIComponent(rewardText);
}

</script>

</body>
</html>
